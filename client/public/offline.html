<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrepWise — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .icon { font-size: 60px; margin-bottom: 1rem; }
    h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
    p { font-size: 15px; color: #666; text-align: center; max-width: 320px; line-height: 1.6; margin-bottom: 1.5rem; }
    .box { background: #FCEBEB; border: 1.5px solid #F09595; border-radius: 12px; padding: 16px 20px; max-width: 320px; width: 100%; margin-bottom: 1.5rem; }
    .box-title { font-size: 13px; font-weight: 700; color: #A32D2D; margin-bottom: 10px; }
    .number { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; color: #791F1F; border-bottom: 1px solid #F7C1C1; }
    .number:last-child { border-bottom: none; }
    a.call { display: block; text-align: center; padding: 12px; background: #E24B4A; color: #fff; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 16px; max-width: 320px; width: 100%; margin-bottom: 12px; }
    button { padding: 12px 28px; background: #185FA5; color: #fff; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; font-weight: 600; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>No internet connection. Here are emergency resources that work without internet.</p>
  <a class="call" href="tel:112">🆘 Call 112 — National Emergency</a>
  <div class="box">
    <div class="box-title">📞 Emergency Numbers</div>
    <div class="number"><span>National Emergency</span><strong>112</strong></div>
    <div class="number"><span>NDMA Helpline</span><strong>1078</strong></div>
    <div class="number"><span>Ambulance</span><strong>108</strong></div>
    <div class="number"><span>Police</span><strong>100</strong></div>
    <div class="number"><span>Fire</span><strong>101</strong></div>
    <div class="number"><span>Health Helpline</span><strong>104</strong></div>
  </div>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
